<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>⚡ CYBER PONG 2077 + TOUCH ⚡</title>
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts sci-fi vibe -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="game-wrapper">

        <div class="cyber-card">

            <!-- HEADER -->
            <div class="game-header">
                <span class="player-tag"><i class="bi bi-joystick"></i> You</span>
                <span class="score-badge" id="liveScoreDisplay">0 : 0</span>
                <span class="ai-tag"><i class="bi bi-cpu"></i> AI</span>
            </div>

            <!-- GAME -->
            <canvas id="gameCanvas" width="800" height="500"></canvas>

            <!-- MOBILE CONTROLLER -->
            <div class="touch-zone-container">
                <div class="touch-zone" id="touchUp">
                    <i class="bi bi-arrow-up"></i>
                </div>

                <div class="touch-zone start-btn" id="touchSpace">
                    <i class="bi bi-play-fill"></i>
                </div>

                <div class="touch-zone" id="touchDown">
                    <i class="bi bi-arrow-down"></i>
                </div>
            </div>

            <!-- STATUS -->
            <div class="control-footer">
                <span>↑ ↓ Move</span>
                <span id="gameStatusText">PRESS SPACE</span>
                <span>SPACE Start</span>
            </div>

        </div>

    </div>

    <script src="game.js"></script>

    <!-- Bootstrap JS (optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
